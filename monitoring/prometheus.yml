global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'kafka-producer'
    static_configs:
      - targets: ['scheduler:8000']
    metrics_path: /metrics

  - job_name: 'spark-consumer'
    static_configs:
      - targets: ['spark-app:8001']
    metrics_path: /metrics
